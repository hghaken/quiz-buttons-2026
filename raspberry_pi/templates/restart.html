<!DOCTYPE html>
<html>
  <head>
  </head>
  <body>
    <h2 style="text-align:center; margin-top:100px;">{{ t.restart.heading }}</h2>
    <p style="text-align:center;" id="status">{{ t.restart.waiting_msg }}</p>

    <script>
      const LANG_STILL_BUSY = "{{ t.restart.still_busy }}";
      setTimeout(function tryConnect() {
        fetch('/')
        .then(response => {
          if (response.ok) window.location.href = '/';
          else setTimeout(tryConnect, 2000);
        })
        .catch(() => {
          document.getElementById('status').textContent = LANG_STILL_BUSY;
          setTimeout(tryConnect, 2000);
        });
      }, 3000);
    </script>
  </body>
</html>
